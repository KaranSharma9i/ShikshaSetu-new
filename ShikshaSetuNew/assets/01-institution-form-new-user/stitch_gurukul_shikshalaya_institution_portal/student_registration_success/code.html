<!-- Success Interaction Script -->
<script>
        // Simple confetti-like micro-interaction on load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.success-seal-container');
            container.classList.add('animate-bounce-subtle');
            
            // Add a slight hover effect to the ID card
            const card = document.querySelector('.glass-card');
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
<style>
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 3s ease-in-out infinite;
        }
        
        /* Entrance animation utility */
        .animate-in {
            animation-duration: 0.5s;
            animation-fill-mode: both;
        }
        .fade-in {
            animation-name: fadeIn;
        }
        .slide-in-from-bottom-4 {
            animation-name: slideInFromBottom;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInFromBottom {
            from { transform: translateY(1rem); }
            to { transform: translateY(0); }
        }
    </style>
