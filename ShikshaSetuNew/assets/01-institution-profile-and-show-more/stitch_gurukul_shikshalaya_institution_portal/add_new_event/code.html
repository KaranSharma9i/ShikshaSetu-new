<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Event - Gurukul Shikshalaya</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&amp;family=Inter:wght@400;500;600&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#f0eded",
                        "tertiary-fixed-dim": "#b3c5fb",
                        "surface-variant": "#e4e2e1",
                        "on-background": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#000000",
                        "outline": "#74777d",
                        "secondary-fixed-dim": "#e9c349",
                        "tertiary": "#000000",
                        "surface-bright": "#fbf9f8",
                        "primary-container": "#0f1c2c",
                        "outline-variant": "#c4c6cc",
                        "surface-container-highest": "#e4e2e1",
                        "surface": "#fbf9f8",
                        "tertiary-container": "#021945",
                        "on-secondary-container": "#745c00",
                        "on-tertiary-fixed": "#021945",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dcd9d9",
                        "surface-container-high": "#eae8e7",
                        "secondary": "#735c00",
                        "on-tertiary-fixed-variant": "#334573",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#fed65b",
                        "on-primary": "#ffffff",
                        "on-surface": "#1b1c1c",
                        "on-primary-fixed-variant": "#3a4859",
                        "inverse-primary": "#bac8dc",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-tint": "#525f71",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#7183b4",
                        "primary-fixed-dim": "#bac8dc",
                        "on-secondary-fixed": "#241a00",
                        "secondary-fixed": "#ffe088",
                        "inverse-surface": "#303030",
                        "inverse-on-surface": "#f3f0f0",
                        "primary-fixed": "#d6e4f9",
                        "on-surface-variant": "#44474c",
                        "tertiary-fixed": "#dae2ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#0f1c2c",
                        "background": "#fbf9f8",
                        "surface-container-low": "#f6f3f2",
                        "on-primary-container": "#778598"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-md": "1rem",
                        "stack-lg": "1.5rem",
                        "gutter": "1rem",
                        "stack-sm": "0.5rem",
                        "section-padding": "2rem",
                        "margin-mobile": "1rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Poppins"],
                        "body-md": ["Inter"],
                        "headline-md": ["Poppins"],
                        "headline-xl": ["Poppins"],
                        "caption": ["Open Sans"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Open Sans"],
                        "headline-lg-mobile": ["Poppins"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-xl": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "caption": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["22px", {"lineHeight": "30px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F7F3EB; /* Brand Canvas Cream */
        }
        .form-input-focus:focus {
            border-color: #0D1B2A;
            box-shadow: 0 0 0 1px #0D1B2A;
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-margin-mobile h-16 bg-primary-container shadow-md">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="p-2 text-on-primary hover:bg-on-primary/10 transition-colors rounded-full flex items-center justify-center active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-on-primary">arrow_back</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-secondary-fixed">Add New Event</h1>
</div>
<button aria-label="More options" class="p-2 text-on-primary hover:bg-on-primary/10 transition-colors rounded-full flex items-center justify-center active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-on-primary">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="mt-16 flex-grow p-margin-mobile lg:max-w-3xl lg:mx-auto w-full">
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-sm mb-stack-lg">
<div class="space-y-stack-lg">
<!-- Event Title -->
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Event Title</label>
<input class="w-full h-12 px-4 border border-outline-variant rounded-lg bg-white text-body-lg font-body-lg form-input-focus transition-all" placeholder="e.g. Annual Sports Meet" type="text"/>
</div>
<!-- Date & Category Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Date</label>
<div class="relative">
<input class="w-full h-12 px-4 border border-outline-variant rounded-lg bg-white text-body-lg font-body-lg form-input-focus transition-all appearance-none" type="date"/>
</div>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Category</label>
<select class="w-full h-12 px-4 border border-outline-variant rounded-lg bg-white text-body-lg font-body-lg form-input-focus transition-all">
<option disabled="" selected="" value="">Select Category</option>
<option value="sports">Sports</option>
<option value="academic">Academic</option>
<option value="cultural">Cultural</option>
<option value="meeting">Meeting</option>
</select>
</div>
</div>
<!-- Time Row -->
<div class="grid grid-cols-2 gap-stack-md">
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Start Time</label>
<input class="w-full h-12 px-4 border border-outline-variant rounded-lg bg-white text-body-lg font-body-lg form-input-focus transition-all" type="time"/>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">End Time</label>
<input class="w-full h-12 px-4 border border-outline-variant rounded-lg bg-white text-body-lg font-body-lg form-input-focus transition-all" type="time"/>
</div>
</div>
<!-- Description -->
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Description</label>
<textarea class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-white text-body-md font-body-md form-input-focus transition-all resize-none" placeholder="Briefly describe the event details, venue, and requirements..." rows="4"></textarea>
</div>
<!-- Recipient Selector -->
<div class="space-y-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Target Audience</label>
<div class="flex flex-wrap gap-stack-sm">
<button class="chip-active px-4 py-2 rounded-full border border-secondary text-secondary font-label-sm text-label-sm hover:bg-secondary-container/20 transition-all flex items-center gap-1" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">person</span>
                            Students
                        </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container transition-all flex items-center gap-1" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">school</span>
                            Teachers
                        </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container transition-all flex items-center gap-1" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">family_restroom</span>
                            Parents
                        </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container transition-all flex items-center gap-1" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">group</span>
                            All
                        </button>
</div>
</div>
</div>
</section>
<!-- Preview Card -->
<div class="bg-primary-container text-on-primary p-6 rounded-xl shadow-lg relative overflow-hidden mb-24">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'FILL' 1">event_note</span>
</div>
<h3 class="font-headline-md text-headline-md mb-2">Publishing Notice</h3>
<p class="text-body-md opacity-80 mb-4">Your event will be immediately visible to the selected audience upon publishing. Ensure all details are verified according to institutional guidelines.</p>
<div class="flex items-center gap-2 text-secondary-fixed">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1">verified</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Official Registrar Approval Required</span>
</div>
</div>
</main>
<!-- Sticky Bottom Action -->
<footer class="fixed bottom-0 left-0 w-full bg-white border-t border-outline-variant p-4 md:px-margin-mobile flex justify-center z-40">
<button class="w-full max-w-3xl bg-primary-container text-on-primary font-label-sm text-headline-md py-4 rounded-lg shadow-xl hover:bg-on-primary-fixed-variant active:scale-95 transition-all flex items-center justify-center gap-2">
            Review &amp; Publish
            <span class="material-symbols-outlined">send</span>
</button>
</footer>
<script>
        function toggleChip(button) {
            const isActive = button.classList.contains('bg-secondary-container');
            if (isActive) {
                button.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
                button.classList.add('border-outline-variant', 'text-on-surface-variant');
            } else {
                button.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
                button.classList.remove('border-outline-variant', 'text-on-surface-variant');
            }
        }

        // Initialize first chip
        const firstChip = document.querySelector('.chip-active');
        if (firstChip) {
            firstChip.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
            firstChip.classList.remove('border-secondary', 'text-secondary');
        }
    </script>
</body></html>
