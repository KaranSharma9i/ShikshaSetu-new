<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&amp;family=Inter:wght@400;600&amp;family=Open+Sans:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#f0eded",
                    "tertiary-fixed-dim": "#b3c5fb",
                    "surface-variant": "#e4e2e1",
                    "on-background": "#1b1c1c",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#000000",
                    "outline": "#74777d",
                    "secondary-fixed-dim": "#e9c349",
                    "tertiary": "#000000",
                    "surface-bright": "#fbf9f8",
                    "primary-container": "#0f1c2c",
                    "outline-variant": "#c4c6cc",
                    "surface-container-highest": "#e4e2e1",
                    "surface": "#fbf9f8",
                    "tertiary-container": "#021945",
                    "on-secondary-container": "#745c00",
                    "on-tertiary-fixed": "#021945",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "surface-dim": "#dcd9d9",
                    "surface-container-high": "#eae8e7",
                    "secondary": "#735c00",
                    "on-tertiary-fixed-variant": "#334573",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "secondary-container": "#fed65b",
                    "on-primary": "#ffffff",
                    "on-surface": "#1b1c1c",
                    "on-primary-fixed-variant": "#3a4859",
                    "inverse-primary": "#bac8dc",
                    "on-secondary-fixed-variant": "#574500",
                    "surface-tint": "#525f71",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#7183b4",
                    "primary-fixed-dim": "#bac8dc",
                    "on-secondary-fixed": "#241a00",
                    "secondary-fixed": "#ffe088",
                    "inverse-surface": "#303030",
                    "inverse-on-surface": "#f3f0f0",
                    "primary-fixed": "#d6e4f9",
                    "on-surface-variant": "#44474c",
                    "tertiary-fixed": "#dae2ff",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#0f1c2c",
                    "background": "#fbf9f8",
                    "surface-container-low": "#f6f3f2",
                    "on-primary-container": "#778598"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-md": "1rem",
                    "stack-lg": "1.5rem",
                    "gutter": "1rem",
                    "stack-sm": "0.5rem",
                    "section-padding": "2rem",
                    "margin-mobile": "1rem"
            },
            "fontFamily": {
                    "headline-lg": ["Poppins"],
                    "body-md": ["Inter"],
                    "headline-md": ["Poppins"],
                    "headline-xl": ["Poppins"],
                    "caption": ["Open Sans"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Open Sans"],
                    "headline-lg-mobile": ["Poppins"]
            },
            "fontSize": {
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "caption": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["22px", {"lineHeight": "30px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-cream-canvas { background-color: #F7F3EB; }
        .success-glow {
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-cream-canvas text-on-background min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-margin-mobile h-16 bg-primary dark:bg-primary-container shadow-md">
<div class="flex items-center gap-4">
<button class="text-on-primary dark:text-on-primary-container hover:bg-primary-fixed-variant/20 transition-colors p-2 rounded-full active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-secondary-container dark:text-secondary-fixed">Institutional Portal</h1>
</div>
<button class="text-on-primary dark:text-on-primary-container hover:bg-primary-fixed-variant/20 transition-colors p-2 rounded-full active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-20 pb-12 text-center">
<!-- Academic Seal / Success Icon -->
<div class="relative mb-stack-lg animate-in fade-in zoom-in duration-700">
<div class="absolute inset-0 bg-secondary-fixed-dim/20 rounded-full blur-2xl success-glow"></div>
<div class="relative w-32 h-32 md:w-40 md:h-40 flex items-center justify-center bg-white border border-outline-variant rounded-full shadow-lg">
<span class="material-symbols-outlined text-[64px] md:text-[80px] text-secondary leading-none" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
<!-- Success Message -->
<div class="max-w-md space-y-stack-md animate-in slide-in-from-bottom-4 duration-1000">
<h2 class="font-headline-xl text-headline-xl text-primary-container tracking-tight">Event Published Successfully</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant px-4">
                The new schedule has been broadcasted to all selected recipients across the institutional network.
            </p>
</div>
<!-- Bento Style Info Summary -->
<div class="grid grid-cols-2 gap-4 w-full max-w-lg mt-stack-lg px-4 animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-200">
<div class="col-span-2 md:col-span-1 bg-white p-4 rounded-xl border border-outline-variant flex flex-col items-center justify-center space-y-1">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">Recipients</span>
<span class="font-headline-md text-headline-md text-primary-container">1,240</span>
</div>
<div class="col-span-2 md:col-span-1 bg-white p-4 rounded-xl border border-outline-variant flex flex-col items-center justify-center space-y-1">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">Status</span>
<div class="flex items-center gap-1">
<span class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></span>
<span class="font-headline-md text-headline-md text-primary-container">Live</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-12 w-full max-w-md px-margin-mobile animate-in fade-in slide-in-from-bottom-12 duration-1000 delay-300">
<button class="flex-1 bg-primary text-on-primary py-4 rounded-lg font-semibold hover:bg-primary-container transition-all active:scale-95 shadow-md">
                View Calendar
            </button>
<button class="flex-1 bg-transparent border-2 border-secondary text-secondary py-4 rounded-lg font-semibold hover:bg-secondary/5 transition-all active:scale-95">
                Back to Utilities
            </button>
</div>
<!-- Achievement Badge Overlay (Glassmorphism) -->
<div class="mt-16 flex items-center gap-3 px-6 py-3 bg-white/40 backdrop-blur-md rounded-full border border-white/60 shadow-sm animate-bounce">
<div class="bg-secondary p-1 rounded-full">
<span class="material-symbols-outlined text-[18px] text-white" data-icon="military_tech">military_tech</span>
</div>
<span class="font-label-sm text-label-sm text-primary-container">Record Authenticated by Registry</span>
</div>
</main>
<!-- Illustrative Background Patterns (Pure CSS) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-5">
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-container rounded-full blur-[100px] -mr-48 -mt-48"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary-container rounded-full blur-[100px] -ml-48 -mb-48"></div>
<div class="w-full h-full" style="background-image: radial-gradient(#000 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
<!-- Script for Micro-interactions -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
        
        // Simple success animation sequence
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Success state initialized');
        });
    </script>
</body></html>
